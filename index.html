<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Michael Lane Boldt — Designer and Technologist. M.Arch SCI-Arc. Gehry Prize recipient.">
  <meta name="theme-color" content="#000000">
  <title>MICHAEL LANE BOLDT</title>
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

<!-- ── DESKTOP FRAME ─────────────────────────────────────────────────────── -->
<!-- frame.png should have a transparent center — place in assets/            -->
<div id="desktop-frame">
  <img src="assets/frame.png" alt="">
</div>

<!-- ── PHONE WRAP ────────────────────────────────────────────────────────── -->
<div id="phone-wrap">

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-time">9:41</span>
    <div class="status-icons">
      <!-- Signal bars -->
      <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
        <rect x="0" y="3" width="2" height="6" fill="white"/>
        <rect x="3" y="2" width="2" height="7" fill="white"/>
        <rect x="6" y="1" width="2" height="8" fill="white"/>
        <rect x="9" y="0" width="2" height="9" fill="white"/>
      </svg>
      <!-- WiFi -->
      <svg width="10" height="9" viewBox="0 0 10 9" fill="none">
        <path d="M5 1.5 Q7.5 3.5 9 3 Q7 5 5 7 Q3 5 1 3 Q2.5 3.5 5 1.5Z" fill="none" stroke="white" stroke-width="1"/>
        <circle cx="5" cy="5" r="1" fill="white"/>
      </svg>
      <!-- Battery -->
      <svg width="18" height="9" viewBox="0 0 18 9" fill="none">
        <rect x="0" y="1" width="15" height="7" rx="2" fill="none" stroke="white" stroke-width="1"/>
        <rect x="1.5" y="2.5" width="10" height="4" rx="1" fill="white"/>
        <rect x="16" y="3" width="1.5" height="3" rx="0.5" fill="white"/>
      </svg>
    </div>
  </div>

  <!-- Screen -->
  <div id="screen">

    <!-- Top safe zone -->
    <div id="topbar"></div>

    <!-- Name header -->
    <div id="name-area">
      <svg id="name-svg" preserveAspectRatio="xMidYMid meet" class="name-svg">
        <defs>
          <filter id="gn" x="-4%" y="-30%" width="110%" height="170%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.11" numOctaves="4" seed="67" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <text
          id="name-text"
          x="0" y="36"
          font-family="Arial, Helvetica, sans-serif"
          font-size="32"
          font-weight="700"
          letter-spacing="-0.03em"
          fill="#111"
          stroke="#111"
          stroke-width="0.4"
          filter="url(#gn)">MICHAEL LANE BOLDT</text>
      </svg>
    </div>

    <!-- Content area -->
    <div id="content-wrap">

      <!-- ── HOME PAGE ─────────────────────────────────────── -->
      <div id="home-page" class="page">

        <!-- Navigation SVG -->
        <svg id="nav-svg" style="position:absolute;display:block;overflow:visible;">
          <defs>
            <filter id="gnav" x="-12%" y="-30%" width="130%" height="175%" color-interpolation-filters="sRGB">
              <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="4" seed="25" result="noise"/>
              <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
          </defs>
        </svg>

        <!-- Invisible nav trigger buttons (centered on text baselines) -->
        <button id="work-btn"    class="nav-btn" aria-label="Work"></button>
        <button id="about-btn"   class="nav-btn" aria-label="About"></button>
        <button id="cv-btn"      class="nav-btn" aria-label="CV"></button>
        <button id="contact-btn" class="nav-btn" aria-label="Contact"></button>

        <!-- Data block — SVG rendered by renderData() in site.js -->
        <div id="data-block"></div>

      </div><!-- /home-page -->

      <!-- ── WORK PAGE ──────────────────────────────────────── -->
      <div id="work-page" class="page sub-page">
        <div id="work-inner"></div>
      </div>

      <!-- ── PROJECT PAGE ───────────────────────────────────── -->
      <div id="project-page" class="page sub-page">
        <div id="project-inner"></div>
      </div>

      <!-- ── ABOUT PAGE ─────────────────────────────────────── -->
      <div id="about-page" class="page sub-page">
        <div id="about-inner" style="width:100%;position:relative;min-height:100%;"></div>
      </div>

      <!-- ── CV PAGE ────────────────────────────────────────── -->
      <div id="cv-page" class="page sub-page">
        <div id="cv-inner" style="width:100%;position:relative;min-height:100%;"></div>
      </div>

      <!-- ── CONTACT PAGE ───────────────────────────────────── -->
      <div id="contact-page" class="page sub-page">
        <div id="contact-inner" style="width:100%;position:relative;min-height:100%;"></div>
      </div>

      <!-- Flash overlay (white cut between page transitions) -->
      <div id="flash-overlay"></div>

    </div><!-- /content-wrap -->

    <!-- Bottom safe zone -->
    <div id="botbar"></div>

  </div><!-- /screen -->
</div><!-- /phone-wrap -->

<!-- Lightbox — desktop image zoom, built by JS -->
<div id="lightbox"><img src="" alt=""></div>

<script src="src/js/site.js"></script>
</body>
</html>
